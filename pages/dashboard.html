<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ReservaFácil</title>

    <!-- CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">

    <!-- Chart.js para gráficos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <style>
        :root {
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #06b6d4;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.6;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dashboard-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dashboard-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .period-selector {
            display: flex;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .period-btn {
            padding: 10px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            border-right: 1px solid var(--gray-200);
        }

        .period-btn:last-child {
            border-right: none;
        }

        .period-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .period-btn:not(.active):hover {
            background: var(--gray-50);
        }

        .refresh-btn {
            padding: 10px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--info-color));
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .stat-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .stat-change {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .stat-change.positive {
            color: var(--success-color);
        }

        .stat-change.negative {
            color: var(--danger-color);
        }

        .stat-change.neutral {
            color: var(--gray-500);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .chart-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .recent-activity {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            margin-bottom: 24px;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .activity-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--gray-50);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .activity-item:hover {
            background: var(--gray-100);
            transform: translateX(4px);
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
            color: white;
        }

        .activity-content {
            flex: 1;
        }

        .activity-text {
            font-weight: 500;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 12px;
            color: var(--gray-500);
        }

        .alerts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .alert-card {
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid;
            background: white;
            box-shadow: var(--shadow-sm);
        }

        .alert-warning {
            border-left-color: var(--warning-color);
            background: #fffbeb;
        }

        .alert-info {
            border-left-color: var(--info-color);
            background: #f0f9ff;
        }

        .alert-success {
            border-left-color: var(--success-color);
            background: #f0fdf4;
        }

        .alert-danger {
            border-left-color: var(--danger-color);
            background: #fef2f2;
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .alert-title {
            font-weight: 600;
            font-size: 14px;
        }

        .alert-message {
            font-size: 13px;
            color: var(--gray-600);
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .quick-stat {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .quick-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 4px;
        }

        .quick-stat-label {
            font-size: 12px;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--gray-500);
        }

        .spinner {
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 16px;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: stretch;
            }

            .dashboard-actions {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 24px;
            }

            .chart-container {
                height: 250px;
            }
        }

        /* Colores específicos para iconos */
        .icon-bookings {
            background: var(--primary-color);
        }

        .icon-revenue {
            background: var(--success-color);
        }

        .icon-customers {
            background: var(--info-color);
        }

        .icon-rating {
            background: var(--warning-color);
        }

        .icon-confirmed {
            background: var(--success-color);
        }

        .icon-pending {
            background: var(--warning-color);
        }

        .icon-cancelled {
            background: var(--danger-color);
        }

        .icon-calendar {
            background: var(--info-color);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Header del Dashboard -->
        <header class="dashboard-header">
            <h1 class="dashboard-title">
                <i class="fas fa-chart-line"></i>
                Dashboard
            </h1>

            <div class="dashboard-actions">
                <!-- Selector de Período -->
                <div class="period-selector">
                    <button class="period-btn active" data-period="today">Hoy</button>
                    <button class="period-btn" data-period="week">Semana</button>
                    <button class="period-btn" data-period="month">Mes</button>
                    <button class="period-btn" data-period="quarter">Trimestre</button>
                </div>

                <!-- Botón de Actualizar -->
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                    Actualizar
                </button>
            </div>
        </header>

        <!-- Alertas -->
        <div class="alerts-section" id="alertsSection">
            <!-- Las alertas se cargarán dinámicamente -->
        </div>

        <!-- Estadísticas Principales -->
        <div class="stats-grid" id="mainStats">
            <!-- Las estadísticas se cargarán dinámicamente -->
        </div>

        <!-- Estadísticas Rápidas -->
        <div class="quick-stats" id="quickStats">
            <!-- Las estadísticas rápidas se cargarán dinámicamente -->
        </div>

        <!-- Gráficos -->
        <div class="charts-grid">
            <!-- Gráfico de Tendencias -->
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-chart-area"></i>
                        Tendencias de Reservas
                    </h3>
                </div>
                <div class="chart-container">
                    <canvas id="trendsChart"></canvas>
                </div>
            </div>

            <!-- Gráfico de Distribución -->
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-chart-pie"></i>
                        Distribución por Estado
                    </h3>
                </div>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Actividad Reciente -->
        <div class="recent-activity">
            <div class="activity-header">
                <h3 class="activity-title">
                    <i class="fas fa-clock"></i>
                    Actividad Reciente
                </h3>
                <a href="calendar.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">
                    Ver todo
                </a>
            </div>
            <div class="activity-list" id="recentActivity">
                <!-- La actividad se cargará dinámicamente -->
            </div>
        </div>

        <!-- Loading State -->
        <div class="loading" id="loadingState" style="display: none;">
            <div class="spinner"></div>
            Cargando datos del dashboard...
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../assets/js/main.js"></script>

    <script>
        class DashboardManager {
            constructor() {
                this.currentPeriod = 'today';
                this.charts = {};
                this.refreshInterval = null;

                this.initializeElements();
                this.bindEvents();
                this.loadDashboard();
                this.startAutoRefresh();
            }

            initializeElements() {
                this.loadingState = document.getElementById('loadingState');
                this.alertsSection = document.getElementById('alertsSection');
                this.mainStats = document.getElementById('mainStats');
                this.quickStats = document.getElementById('quickStats');
                this.recentActivity = document.getElementById('recentActivity');
            }

            bindEvents() {
                // Period selector buttons
                document.querySelectorAll('.period-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.changePeriod(e.target.dataset.period);
                    });
                });

                // Refresh button
                document.getElementById('refreshBtn').addEventListener('click', () => {
                    this.refreshDashboard();
                });

                // Auto-refresh every 5 minutes
                this.refreshInterval = setInterval(() => {
                    this.loadDashboard(false); // Silent refresh
                }, 300000);
            }

            changePeriod(period) {
                this.currentPeriod = period;

                // Update active button
                document.querySelectorAll('.period-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.period === period);
                });

                this.loadDashboard();
            }

            async loadDashboard(showLoading = true) {
                if (showLoading) {
                    this.showLoading(true);
                }

                try {
                    // Load all dashboard data in parallel
                    const [overviewData, alertsData, recentBookingsData] = await Promise.all([
                        this.fetchDashboardData('overview'),
                        this.fetchDashboardData('alerts'),
                        this.fetchDashboardData('recent-bookings', { limit: 10 })
                    ]);

                    // Render all sections
                    this.renderAlerts(alertsData);
                    this.renderMainStats(overviewData);
                    this.renderQuickStats(overviewData);
                    this.renderCharts(overviewData);
                    this.renderRecentActivity(recentBookingsData);

                } catch (error) {
                    console.error('Error loading dashboard:', error);
                    this.showError('Error al cargar el dashboard');
                } finally {
                    if (showLoading) {
                        this.showLoading(false);
                    }
                }
            }

            async fetchDashboardData(type, params = {}) {
                const token = localStorage.getItem('auth_token');
                if (!token) {
                    throw new Error('No authentication token');
                }

                const queryParams = new URLSearchParams({
                    type: type,
                    period: this.currentPeriod,
                    ...params
                });

                const response = await fetch(`../api/users/dashboard-stats.php?${queryParams}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        this.handleAuthError();
                        return;
                    }
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error?.message || 'Error desconocido');
                }

                return data.data;
            }

            renderAlerts(alertsData) {
                if (!alertsData || !alertsData.alerts) {
                    this.alertsSection.style.display = 'none';
                    return;
                }

                const alerts = alertsData.alerts;

                if (alerts.length === 0) {
                    this.alertsSection.style.display = 'none';
                    return;
                }

                this.alertsSection.style.display = 'grid';
                this.alertsSection.innerHTML = alerts.map(alert => `
                    <div class="alert-card alert-${this.getAlertType(alert.priority)}">
                        <div class="alert-header">
                            <i class="fas ${this.getAlertIcon(alert.type)}"></i>
                            <span class="alert-title">${alert.title}</span>
                            ${alert.count > 0 ? `<span style="margin-left: auto; font-weight: 700;">${alert.count}</span>` : ''}
                        </div>
                        <div class="alert-message">${alert.message}</div>
                    </div>
                `).join('');
            }

            renderMainStats(data) {
                const stats = data.stats;
                const changes = data.changes;

                const mainStatsHTML = [
                    {
                        title: 'Total Reservas',
                        value: stats.bookings.total,
                        change: changes.bookings.total,
                        icon: 'fa-calendar-check',
                        class: 'icon-bookings'
                    },
                    {
                        title: 'Ingresos',
                        value: this.formatCurrency(stats.revenue.total),
                        change: changes.revenue.total,
                        icon: 'fa-dollar-sign',
                        class: 'icon-revenue'
                    },
                    {
                        title: 'Clientes',
                        value: stats.customers.unique,
                        change: changes.customers.unique,
                        icon: 'fa-users',
                        class: 'icon-customers'
                    },
                    {
                        title: 'Calificación',
                        value: stats.rating.average,
                        change: changes.rating.average,
                        icon: 'fa-star',
                        class: 'icon-rating',
                        suffix: '/5'
                    }
                ].map(stat => `
                    <div class="stat-card">
                        <div class="stat-header">
                            <div>
                                <div class="stat-title">${stat.title}</div>
                                <div class="stat-value">${stat.value}${stat.suffix || ''}</div>
                                <div class="stat-change ${this.getChangeClass(stat.change)}">
                                    <i class="fas ${this.getChangeIcon(stat.change)}"></i>
                                    ${Math.abs(stat.change)}% vs período anterior
                                </div>
                            </div>
                            <div class="stat-icon ${stat.class}">
                                <i class="fas ${stat.icon}"></i>
                            </div>
                        </div>
                    </div>
                `).join('');

                this.mainStats.innerHTML = mainStatsHTML;
            }

            renderQuickStats(data) {
                const stats = data.stats;

                const quickStatsData = [
                    { label: 'Confirmadas', value: stats.bookings.confirmed, class: 'icon-confirmed' },
                    { label: 'Pendientes', value: stats.bookings.pending, class: 'icon-pending' },
                    { label: 'Canceladas', value: stats.bookings.cancelled, class: 'icon-cancelled' },
                    { label: 'Servicios Activos', value: stats.services, class: 'icon-calendar' },
                    { label: 'Tasa Completación', value: `${stats.completion_rate}%`, class: 'icon-confirmed' },
                    { label: 'Promedio/Reserva', value: this.formatCurrency(stats.revenue.average), class: 'icon-revenue' }
                ];

                this.quickStats.innerHTML = quickStatsData.map(stat => `
                    <div class="quick-stat">
                        <div class="quick-stat-value">${stat.value}</div>
                        <div class="quick-stat-label">${stat.label}</div>
                    </div>
                `).join('');
            }

            renderCharts(data) {
                this.renderTrendsChart(data.trends);
                this.renderStatusChart(data.stats.bookings);
            }

            renderTrendsChart(trendsData) {
                const ctx = document.getElementById('trendsChart');

                // Destroy existing chart if it exists
                if (this.charts.trends) {
                    this.charts.trends.destroy();
                }

                this.charts.trends = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trendsData.bookings.map(item => item.period),
                        datasets: [
                            {
                                label: 'Reservas',
                                data: trendsData.bookings.map(item => item.total),
                                borderColor: 'rgb(59, 130, 246)',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                tension: 0.4,
                                fill: true
                            },
                            {
                                label: 'Ingresos',
                                data: trendsData.revenue.map(item => item.revenue),
                                borderColor: 'rgb(16, 185, 129)',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                tension: 0.4,
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            }
                        },
                        scales: {
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                grid: {
                                    drawOnChartArea: false,
                                },
                            }
                        }
                    }
                });
            }

            renderStatusChart(bookingsData) {
                const ctx = document.getElementById('statusChart');

                // Destroy existing chart if it exists
                if (this.charts.status) {
                    this.charts.status.destroy();
                }

                this.charts.status = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Confirmadas', 'Pendientes', 'Completadas', 'Canceladas'],
                        datasets: [{
                            data: [
                                bookingsData.confirmed,
                                bookingsData.pending,
                                bookingsData.completed,
                                bookingsData.cancelled
                            ],
                            backgroundColor: [
                                'rgb(16, 185, 129)',
                                'rgb(245, 158, 11)',
                                'rgb(6, 182, 212)',
                                'rgb(239, 68, 68)'
                            ],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                            }
                        }
                    }
                });
            }

            renderRecentActivity(bookingsData) {
                if (!bookingsData || !bookingsData.bookings) {
                    this.recentActivity.innerHTML = '<p>No hay actividad reciente</p>';
                    return;
                }

                const bookings = bookingsData.bookings.slice(0, 5);

                this.recentActivity.innerHTML = bookings.map(booking => `
                    <div class="activity-item">
                        <div class="activity-icon ${this.getStatusIconClass(booking.status)}">
                            <i class="fas ${this.getStatusIcon(booking.status)}"></i>
                        </div>
                        <div class="activity-content">
                            <div class="activity-text">
                                Nueva reserva: <strong>${booking.customer_name}</strong> - ${booking.service_name}
                            </div>
                            <div class="activity-time">
                                ${this.formatDateTime(booking.booking_date, booking.booking_time)}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Utility functions
            getAlertType(priority) {
                const types = {
                    'high': 'danger',
                    'medium': 'warning',
                    'low': 'info'
                };
                return types[priority] || 'info';
            }

            getAlertIcon(type) {
                const icons = {
                    'pending_bookings': 'fa-clock',
                    'today_bookings': 'fa-calendar-day',
                    'inactive_customers': 'fa-user-slash',
                    'inactive_services': 'fa-pause-circle',
                    'pending_reviews': 'fa-star',
                    'low_capacity': 'fa-chart-line'
                };
                return icons[type] || 'fa-info-circle';
            }

            getChangeClass(change) {
                if (change > 0) return 'positive';
                if (change < 0) return 'negative';
                return 'neutral';
            }

            getChangeIcon(change) {
                if (change > 0) return 'fa-arrow-up';
                if (change < 0) return 'fa-arrow-down';
                return 'fa-minus';
            }

            getStatusIconClass(status) {
                const classes = {
                    'confirmed': 'icon-confirmed',
                    'pending': 'icon-pending',
                    'completed': 'icon-confirmed',
                    'cancelled': 'icon-cancelled',
                    'no_show': 'icon-cancelled'
                };
                return classes[status] || 'icon-pending';
            }

            getStatusIcon(status) {
                const icons = {
                    'confirmed': 'fa-check',
                    'pending': 'fa-clock',
                    'completed': 'fa-check-double',
                    'cancelled': 'fa-times',
                    'no_show': 'fa-user-times'
                };
                return icons[status] || 'fa-question';
            }

            formatCurrency(amount) {
                return new Intl.NumberFormat('es-ES', {
                    style: 'currency',
                    currency: 'EUR',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 2
                }).format(amount);
            }

            formatDateTime(date, time) {
                const dateTime = new Date(`${date} ${time}`);
                const now = new Date();
                const diffTime = now - dateTime;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
                const diffMinutes = Math.floor(diffTime / (1000 * 60));

                if (diffMinutes < 1) {
                    return 'Hace un momento';
                } else if (diffMinutes < 60) {
                    return `Hace ${diffMinutes} minuto${diffMinutes !== 1 ? 's' : ''}`;
                } else if (diffHours < 24) {
                    return `Hace ${diffHours} hora${diffHours !== 1 ? 's' : ''}`;
                } else if (diffDays < 7) {
                    return `Hace ${diffDays} día${diffDays !== 1 ? 's' : ''}`;
                } else {
                    return dateTime.toLocaleDateString('es-ES', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });
                }
            }

            showLoading(show) {
                this.loadingState.style.display = show ? 'flex' : 'none';
            }

            showError(message) {
                // Create error notification
                const errorDiv = document.createElement('div');
                errorDiv.className = 'alert-card alert-danger';
                errorDiv.style.position = 'fixed';
                errorDiv.style.top = '20px';
                errorDiv.style.right = '20px';
                errorDiv.style.zIndex = '1000';
                errorDiv.style.maxWidth = '300px';

                errorDiv.innerHTML = `
                    <div class="alert-header">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span class="alert-title">Error</span>
                        <button onclick="this.parentElement.parentElement.remove()" style="margin-left: auto; background: none; border: none; cursor: pointer;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="alert-message">${message}</div>
                `;

                document.body.appendChild(errorDiv);

                // Auto remove after 5 seconds
                setTimeout(() => {
                    if (errorDiv.parentElement) {
                        errorDiv.remove();
                    }
                }, 5000);
            }

            showSuccess(message) {
                // Create success notification
                const successDiv = document.createElement('div');
                successDiv.className = 'alert-card alert-success';
                successDiv.style.position = 'fixed';
                successDiv.style.top = '20px';
                successDiv.style.right = '20px';
                successDiv.style.zIndex = '1000';
                successDiv.style.maxWidth = '300px';

                successDiv.innerHTML = `
                    <div class="alert-header">
                        <i class="fas fa-check-circle"></i>
                        <span class="alert-title">Éxito</span>
                        <button onclick="this.parentElement.parentElement.remove()" style="margin-left: auto; background: none; border: none; cursor: pointer;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="alert-message">${message}</div>
                `;

                document.body.appendChild(successDiv);

                // Auto remove after 3 seconds
                setTimeout(() => {
                    if (successDiv.parentElement) {
                        successDiv.remove();
                    }
                }, 3000);
            }

            refreshDashboard() {
                const refreshIcon = document.querySelector('#refreshBtn i');
                refreshIcon.style.animation = 'spin 1s linear infinite';

                this.loadDashboard(true).finally(() => {
                    refreshIcon.style.animation = '';
                    this.showSuccess('Dashboard actualizado correctamente');
                });
            }

            handleAuthError() {
                localStorage.removeItem('auth_token');
                window.location.href = 'login.html';
            }

            startAutoRefresh() {
                // Check if user is active every 5 minutes and refresh
                let lastActivity = Date.now();

                const updateActivity = () => {
                    lastActivity = Date.now();
                };

                // Track user activity
                ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(event => {
                    document.addEventListener(event, updateActivity, true);
                });

                // Auto refresh every 5 minutes if user is active
                setInterval(() => {
                    const timeSinceActivity = Date.now() - lastActivity;
                    const fiveMinutes = 5 * 60 * 1000;

                    // Only refresh if user was active in the last 10 minutes
                    if (timeSinceActivity < fiveMinutes * 2) {
                        this.loadDashboard(false); // Silent refresh
                    }
                }, fiveMinutes);
            }

            // Method to handle real-time updates via WebSocket (future enhancement)
            initializeRealTimeUpdates() {
                // This would connect to a WebSocket for real-time updates
                // For now, we'll use polling
                console.log('Real-time updates would be initialized here');
            }

            // Export dashboard data
            async exportDashboardData() {
                try {
                    const data = await this.fetchDashboardData('overview');
                    const exportData = {
                        period: this.currentPeriod,
                        generated_at: new Date().toISOString(),
                        stats: data.stats,
                        trends: data.trends
                    };

                    const blob = new Blob([JSON.stringify(exportData, null, 2)], {
                        type: 'application/json'
                    });

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `dashboard-${this.currentPeriod}-${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    this.showSuccess('Datos exportados correctamente');
                } catch (error) {
                    console.error('Error exporting data:', error);
                    this.showError('Error al exportar los datos');
                }
            }
        }

        // Initialize dashboard when page loads
        let dashboardManager;

        document.addEventListener('DOMContentLoaded', function () {
            // Check authentication
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // Initialize dashboard
            dashboardManager = new DashboardManager();

            // Add keyboard shortcuts
            document.addEventListener('keydown', function (e) {
                // R key to refresh
                if (e.key === 'r' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    dashboardManager.refreshDashboard();
                }

                // E key to export
                if (e.key === 'e' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    dashboardManager.exportDashboardData();
                }
            });
        });

        // Handle page visibility change
        document.addEventListener('visibilitychange', function () {
            if (!document.hidden && dashboardManager) {
                // Refresh when user comes back to the tab
                dashboardManager.loadDashboard(false);
            }
        });

        // Handle online/offline status
        window.addEventListener('online', function () {
            if (dashboardManager) {
                dashboardManager.showSuccess('Conexión restaurada');
                dashboardManager.loadDashboard(false);
            }
        });

        window.addEventListener('offline', function () {
            if (dashboardManager) {
                dashboardManager.showError('Sin conexión a internet');
            }
        });

        // Global error handler
        window.addEventListener('unhandledrejection', function (event) {
            console.error('Unhandled promise rejection:', event.reason);

            // If it's an authentication error, redirect to login
            if (event.reason.message && event.reason.message.includes('401')) {
                if (dashboardManager) {
                    dashboardManager.handleAuthError();
                }
            }
        });

        // Add export functionality to refresh button (right click)
        document.addEventListener('contextmenu', function (e) {
            if (e.target.closest('#refreshBtn')) {
                e.preventDefault();
                if (dashboardManager) {
                    dashboardManager.exportDashboardData();
                }
            }
        });
    </script>

    <!-- Additional styles for animations and responsive design -->
    <style>

            from {

                transform: translateY(20px);
            }

            to {

                transform: translateY(0);
            }

        .stat-card,

        .recent-activity,
        .alert-card {
            animation: fadeIn 0.5s ease-out;
        }

        .stat-card:nth-child(1) {

        }

        .stat-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .stat-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .stat-card:nth-child(4) {
            animation-delay: 0.4s;

        /* Print styles */
        @media print {

            .dashboard-actions,
            .refresh-btn,
            .period-selector {
                display: none !important;
            }

            .dashboard-container {
                max-width: none;
                padding: 0;
            }

            .stat-card,
            .chart-card,
            .recent-activity {
                break-inside: avoid;
                box-shadow: none !important;
                border: 1px solid #ccc !important;
            }
        }

        /* High contrast mode */
        @media (prefers-contrast: high) {
            :root {
                --primary-color: #0066cc;
                --success-color: #00aa00;
                --warning-color: #cc6600;
                --danger-color: #cc0000;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            :root {
                --gray-50: #1f2937;
                --gray-100: #374151;
                --gray-200: #4b5563;
                --gray-800: #f9fafb;
                --gray-900: #ffffff;
            }

            body {
                background-color: var(--gray-50);
                color: var(--gray-900);
            }
        }
    </style>
