<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Login - Sistema de Reservas</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Estilos personalizados -->
    <link href="../assets/css/auth.css" rel="stylesheet">
</head>

<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <!-- Imagen lateral -->
                            <div class="col-lg-6 d-none d-lg-block bg-login-image">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h2 text-white mb-4">¡Bienvenido de vuelta!</h1>
                                        <p class="text-white-50">Accede a tu cuenta para gestionar tus reservas</p>
                                        <i class="fas fa-calendar-check fa-3x text-white-50 mt-4"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- Formulario -->
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Iniciar Sesión</h1>
                                    </div>

                                    <form class="user secure-form" action="../api/auth.php" method="POST">
                                        <input type="hidden" name="action" value="login">
                                        <input type="hidden" name="csrf_token" value="">

                                        <div class="form-group mb-3">
                                            <div class="input-group">
                                                <span class="input-group-text">
                                                    <i class="fas fa-envelope"></i>
                                                </span>
                                                <input type="email" class="form-control form-control-user" name="email"
                                                    placeholder="Ingresa tu email..." data-validate="email" required>
                                            </div>
                                        </div>

                                        <div class="form-group mb-3">
                                            <div class="input-group">
                                                <span class="input-group-text">
                                                    <i class="fas fa-lock"></i>
                                                </span>
                                                <input type="password" class="form-control form-control-user"
                                                    name="password" placeholder="Contraseña" data-validate="required"
                                                    required>
                                                <button class="btn btn-outline-secondary toggle-password" type="button">
                                                    <i class="fas fa-eye"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <div class="form-group mb-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" name="remember_me"
                                                    id="rememberMe">
                                                <label class="form-check-label" for="rememberMe">
                                                    Recordarme
                                                </label>
                                            </div>
                                        </div>

                                        <button type="submit" class="btn btn-primary btn-user btn-block w-100"
                                            data-original-text="Iniciar Sesión">
                                            Iniciar Sesión
                                        </button>

                                        <hr>

                                        <div class="text-center">
                                            <a class="small" href="forgot-password.html">¿Olvidaste tu contraseña?</a>
                                        </div>
                                        <div class="text-center">
                                            <a class="small" href="register.html">¡Crear una cuenta!</a>
                                        </div>
                                    </form>

                                    <!-- Demo credentials -->
                                    <div class="mt-4 p-3 bg-light rounded">
                                        <small class="text-muted">
                                            <strong>Demo:</strong><br>
                                            Email: demo@reservas.com<br>
                                            Contraseña: Demo123!
                                        </small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Secure Forms JS -->
    <script src="../assets/js/secure-forms.js"></script>

    <script>
        // Redirección después del login exitoso
        document.addEventListener('DOMContentLoaded', function () {
            // Generar token CSRF simple para demo
            const csrfToken = 'demo_token_' + Math.random().toString(36).substring(7);
            document.querySelector('meta[name="csrf-token"]').setAttribute('content', csrfToken);
            document.querySelector('input[name="csrf_token"]').value = csrfToken;

            const forms = document.querySelectorAll('.secure-form');
            forms.forEach(form => {
                form.addEventListener('submit', async function (e) {
                    e.preventDefault();

                    // Simular login exitoso para demo
                    const formData = new FormData(form);
                    const email = formData.get('email');
                    const password = formData.get('password');

                    // Mostrar loading
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Iniciando...';
                    submitBtn.disabled = true;

                    // Simular delay de red
                    setTimeout(() => {
                        if (email && password) {
                            // Mostrar mensaje de éxito
                            const alertDiv = document.createElement('div');
                            alertDiv.className = 'alert alert-success alert-dismissible fade show';
                            alertDiv.innerHTML = `
                                ¡Login exitoso! Redirigiendo al dashboard...
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            `;
                            form.insertBefore(alertDiv, form.firstChild);

                            // Simular redirección
                            setTimeout(() => {
                                window.location.href = '../dashboard/';
                            }, 1500);
                        } else {
                            // Mostrar error
                            const alertDiv = document.createElement('div');
                            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
                            alertDiv.innerHTML = `
                                Por favor completa todos los campos
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            `;
                            form.insertBefore(alertDiv, form.firstChild);

                            submitBtn.innerHTML = 'Iniciar Sesión';
                            submitBtn.disabled = false;
                        }
                    }, 1000);
                });
            });
        });
    </script>
</body>

</html>
